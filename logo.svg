<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="100%">
  <!-- Definitions for Gradients -->
  <defs>
    <!-- Wine & Gaming liquid gradient -->
    <linearGradient id="wineGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F1D1D" /> <!-- Deep Wine Red -->
      <stop offset="60%" stop-color="#B91C1C" /> <!-- Crimson -->
      <stop offset="100%" stop-color="#EC4899" /> <!-- Neon Pink/Rose -->
    </linearGradient>
    
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
  </defs>

  <!-- Clean, minimalist background suited for GitHub light & dark mode -->
  <rect width="700" height="180" rx="12" fill="#0B0F19" />

  <!-- Logo Group -->
  <g transform="translate(45, 20)">
    <!-- Wine Glass Outline -->
    <path d="M 50 110 C 20 110, 10 80, 10 30 L 90 30 C 90 80, 80 110, 50 110 Z" 
          fill="none" stroke="#374151" stroke-width="4" stroke-linejoin="round" />
    <!-- Glass Stem & Base -->
    <path d="M 50 110 L 50 135 M 25 135 L 75 135" 
          fill="none" stroke="#374151" stroke-width="4" stroke-linecap="round" />
    
    <!-- Liquid in the glass (Wine) -->
    <path d="M 14 42 C 22 40, 78 40, 86 42 C 86 78, 76 104, 50 104 C 24 104, 14 78, 14 42 Z" 
          fill="url(#wineGrad)" />
    
    <!-- Cutout/Overlay: Minimalist Gamepad Silhouette in the wine liquid -->
    <!-- Controller Body -->
    <rect x="28" y="58" width="44" height="24" rx="12" fill="#0B0F19" />
    <!-- Left D-pad (simple plus) -->
    <path d="M 36 70 L 42 70 M 39 67 L 39 73" stroke="#EC4899" stroke-width="2" stroke-linecap="round" />
    <!-- Right Buttons (dots) -->
    <circle cx="58" cy="67" r="2.2" fill="#E11D48" />
    <circle cx="64" cy="73" r="2.2" fill="#E11D48" />
  </g>

  <!-- Typography / Branding -->
  <g transform="translate(180, 105)">
    <!-- Terminal prompt symbol -->
    <text x="0" y="0" font-family="monospace" font-weight="bold" font-size="48" fill="#EC4899">&gt;_</text>
    
    <!-- Title: LGTUI -->
    <text x="70" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="64" fill="url(#textGrad)" letter-spacing="1">LGTUI</text>
    
    <!-- Subtitle: Linux Gaming Terminal UI -->
    <text x="75" y="32" font-family="monospace" font-size="14" fill="#9CA3AF" letter-spacing="1">Linux Gaming Terminal UI</text>
  </g>
</svg>
